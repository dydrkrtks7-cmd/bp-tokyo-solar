    <style>
        /* ===== RESET & BASE ===== */
        *,

            margin: 0;

        html {

        body {

        /* ===== TYPOGRAPHY ===== */
        h1, h2, h3, h4 {

            text-transform: uppercase;
            letter-spacing: 0.01em;
        }

        h1 {

            line-height: 0.85;

        h2 {

        h3 {

        p {

        a {

            text-decoration: none;

            transition: all 0.15s ease;
        }

        a:hover {

        }

        strong, b {

        /* ===== UTILITIES ===== */

            padding: 72px 40px;
            margin: 0 auto;
        }

        .container--narrow {

        }

        .gap-48 {

        }

        .gap-72 {
            gap: 72px;
        }

        .section-gap {
            padding: 120px 40px;
        }

        .border-brutal {
            border: 4px solid #ffffff;
            background: #000000;
            padding: 32px;
            box-shadow: 8px 8px 0 #ff3b00;
        }

        .border-brutal--accent {
            border-color: #ff3b00;
            box-shadow: 8px 8px 0 #ffffff;
        }

        .text-accent {
            color: #ff3b00;
        }

        .text-white {
            color: #ffffff;
        }

        .bg-black {
            background: #000000;
        }

        .bg-accent {
            background: #ff3b00;
            color: #000000;
        }

        .skew-left {
            transform: skewX(-4deg);
        }

        .skew-right {
            transform: skewX(4deg);
        }

        .rotate-neg {
            transform: rotate(-1.5deg);
        }

        .rotate-pos {
            transform: rotate(1.5deg);
        }

        .full-bleed {
            width: 100%;
            max-width: none;
        }

        .mono {
            font-family: 'Courier New', 'Consolas', monospace;
            font-weight: 700;
        }

        /* ===== LAYOUT COMPONENTS ===== */
        /* HEADER & NAV */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: #000000;
            border-bottom: 4px solid #ff3b00;
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            color: #ff3b00;
            text-transform: uppercase;
            text-decoration: none;
            border: none;
            line-height: 1;
        }

        .logo span {
            color: #ffffff;
        }

        .nav-desktop {
            display: flex;
            gap: 48px;
            align-items: center;
            list-style: none;
        }

        .nav-desktop li a {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 3px solid transparent;
            padding: 4px 0;
            transition: 0.2s;
        }

        .nav-desktop li a:hover {
            border-bottom-color: #ff3b00;
        }

        /* Hamburger (mobile) */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            z-index: 1100;
        }

        .hamburger span {
            display: block;
            width: 32px;
            height: 4px;
            background: #ffffff;
            transition: 0.3s;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(7px, 7px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        .nav-mobile {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 48px;
            list-style: none;
            z-index: 1050;
        }

        .nav-mobile.active {
            display: flex;
        }

        .nav-mobile li a {
            font-size: 2.4rem;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 4px solid #ff3b00;
            padding: 8px 16px;
        }

        /* HERO */
        .hero {
            margin-top: 90px;
            padding: 120px 40px 80px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            border-bottom: 4px solid #ff3b00;
        }

        .hero__label {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            color: #ff3b00;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            border: 3px solid #ff3b00;
            display: inline-block;
            padding: 8px 24px;
            transform: skewX(-6deg);
            width: fit-content;
        }

        .hero__title {
            font-size: clamp(3.6rem, 14vw, 7.2rem);
            line-height: 0.85;
            max-width: 1000px;
        }

        .hero__sub {
            font-size: 1.4rem;
            font-family: system-ui, sans-serif;
            font-weight: 400;
            max-width: 640px;
            border-left: 6px solid #ff3b00;
            padding-left: 24px;
        }

        .hero__cta a {
            display: inline-block;
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            background: #ff3b00;
            color: #000000;
            padding: 16px 48px;
            border: 4px solid #ffffff;
            box-shadow: 8px 8px 0 #ffffff;
            transform: rotate(-1deg);
            transition: 0.15s;
            text-decoration: none;
        }

        .hero__cta a:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ff3b00;
            box-shadow: 8px 8px 0 #ff3b00;
            transform: rotate(0deg);
        }

        /* INFO STRIP */
        .info-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 48px 72px;
            padding: 72px 40px;
            border-bottom: 4px solid #ffffff;
            font-size: 1.1rem;
        }

        .info-strip__item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-strip__label {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #ff3b00;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .info-strip__value {
            font-size: 1.6rem;
            font-weight: 900;
        }

        .info-strip__value a {
            border-bottom: 3px solid #ff3b00;
        }

        /* SECTIONS */
        section {
            padding: 120px 40px;
        }

        .section__header {
            margin-bottom: 72px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #ff3b00;
            letter-spacing: 0.25em;
            border-left: 4px solid #ff3b00;
            padding-left: 16px;
        }

        /* REVIEW CARDS (UGC) */
        .review-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 48px;
        }

        .review-card {
            border: 4px solid #ffffff;
            background: #000000;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transform: rotate(var(--rot, 0deg));
            box-shadow: 8px 8px 0 #ff3b00;
        }

        .review-card:nth-child(odd) { --rot: -1.5deg; }
        .review-card:nth-child(even) { --rot: 1deg; }

        .review-card__header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 2px solid #ff3b00;
            padding-bottom: 12px;
        }

        .review-card__nick {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        .review-card__date {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #888;
        }

        .review-card__stars {
            font-size: 1.8rem;
            letter-spacing: 0.1em;
            color: #ff3b00;
        }

        .review-card__text {
            font-family: system-ui, sans-serif;
            font-weight: 400;
            line-height: 1.5;
            font-size: 1rem;
            flex-grow: 1;
        }

        /* STATS BLOCK */
        .stats-block {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 48px;
            border: 4px solid #ff3b00;
            padding: 64px 40px;
            background: #000000;
            box-shadow: 12px 12px 0 #ffffff;
        }

        .stat-item {
            text-align: center;
            border-right: 3px solid #333;
            padding: 0 24px;
        }

        .stat-item:last-child {
            border-right: none;
        }

        .stat-item__number {
            font-size: 3.6rem;
            font-weight: 900;
            color: #ff3b00;
            line-height: 1;
        }

        .stat-item__label {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* CTA SECTION */
        .cta-section {
            background: #ff3b00;
            color: #000000;
            padding: 120px 40px;
            text-align: center;
            border-top: 4px solid #ffffff;
            border-bottom: 4px solid #ffffff;
        }

        .cta-section h2 {
            border-bottom-color: #000000;
            color: #000000;
            font-size: clamp(2.8rem, 8vw, 5rem);
        }

        .cta-section .cta-link {
            display: inline-block;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            background: #000000;
            color: #ffffff;
            padding: 20px 64px;
            border: 4px solid #ffffff;
            box-shadow: 8px 8px 0 #000000;
            transform: rotate(1deg);
            margin-top: 32px;
            transition: 0.15s;
        }

        .cta-section .cta-link:hover {
            background: #ffffff;
            color: #000000;
            border-color: #000000;
            box-shadow: 8px 8px 0 #ff3b00;
            transform: rotate(-0.5deg);
        }

        /* FOOTER */
        footer {
            padding: 72px 40px 40px;
            border-top: 4px solid #ff3b00;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 32px;
            font-family: system-ui, sans-serif;
        }

        footer .copy {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        footer .footer-links {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }

        footer .footer-links a {
            font-size: 0.9rem;
            border-bottom: 2px solid transparent;
        }

        footer .footer-links a:hover {
            border-bottom-color: #ff3b00;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {

            header {
                padding: 12px 24px;
            }

            .nav-desktop {
                display: none;
            }

            .hamburger {
                display: flex;
            }

            .hero {
                padding: 100px 24px 60px;
                margin-top: 80px;
            }

            .hero__title {
                font-size: clamp(2.8rem, 10vw, 4.8rem);
            }

            .hero__cta a {
                font-size: 1.4rem;
                padding: 14px 32px;
            }

            .info-strip {
                padding: 48px 24px;
                gap: 32px;
            }

            .info-strip__value {
                font-size: 1.3rem;
            }

            section {
                padding: 80px 24px;
            }

            .section__header {
                margin-bottom: 48px;
            }

            .review-grid {
                grid-template-columns: 1fr;
                gap: 32px;
            }

            .review-card {
                transform: none;
            }

            .stats-block {
                grid-template-columns: 1fr 1fr;
                padding: 40px 24px;
                gap: 32px;
            }

            .stat-item {
                border-right: none;
                border-bottom: 3px solid #333;
                padding-bottom: 24px;
            }

            .stat-item:nth-child(even) {
                border-bottom: none;
            }

            .cta-section {
                padding: 80px 24px;
            }

            .cta-section .cta-link {
                font-size: 1.6rem;
                padding: 16px 40px;
            }

            footer {
                flex-direction: column;
                text-align: center;
                padding: 48px 24px;
            }

            footer .footer-links {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .stats-block {
                grid-template-columns: 1fr;
            }

            .stat-item {
                border-bottom: 3px solid #333;
                padding-bottom: 24px;
            }

            .stat-item:last-child {
                border-bottom: none;
            }
        }
